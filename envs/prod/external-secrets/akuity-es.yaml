apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: bitwarden-secretsmanager
  namespace: akuity
spec:
  provider:
    bitwardensecretsmanager:
      apiURL: https://vault.bitwarden.com/api
      identityURL: https://vault.bitwarden.com/identity
      auth:
        secretRef:
          credentials:
            key: token
            name: bitwarden-access-token
      bitwardenServerSDKURL: https://bitwarden-sdk-server.external-secrets.svc.cluster.local:9998
      caBundle: 
      organizationID: 9e7eec71-0b50-4861-aa5a-aab3006ad710s
      projectID: 7a7bca4a-3e6f-43cd-8b53-b3a200adabf8
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: bitwarden-secretsmanager
  namespace: akuity-kargo
spec:
  provider:
    bitwardensecretsmanager:
      apiURL: https://vault.bitwarden.com/api
      identityURL: https://vault.bitwarden.com/identity
      auth:
        secretRef:
          credentials:
            key: token
            name: bitwarden-access-token
      bitwardenServerSDKURL: https://bitwarden-sdk-server.external-secrets.svc.cluster.local:9998
      caBundle: 
      organizationID: 9e7eec71-0b50-4861-aa5a-aab3006ad710s
      projectID: 7a7bca4a-3e6f-43cd-8b53-b3a200adabf8
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cluster-addons-creds
  namespace: akuity
  labels:
   argocd.argoproj.io/secret-type: repository
   akuity.io/secret-sync: "true"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: SecretStore
  target:
    deletionPolicy: Delete
  dataFrom:
  - extract:
      conversionStrategy: Default	
      decodingStrategy: None
      metadataPolicy: None
      key: "e9d0506a-6d68-45f8-af88-b3a3005748b8"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kargo-helm-prom-stack
  namespace: akuity-kargo
  labels:
   kargo.akuity.io/cred-type: git
   kargo.akuity.io/secret-sync: "kargo-shared-resources"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: SecretStore
  target:
    deletionPolicy: Delete
  dataFrom:
  - extract:
      conversionStrategy: Default	
      decodingStrategy: None
      metadataPolicy: None
      key: "4fff35e9-20c1-4a3e-bd27-b3a3004b5f1a"
